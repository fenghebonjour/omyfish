name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check token
        id: check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret not set — skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Push to HuggingFace Spaces
        if: steps.check.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://fenghebonjour:${HF_TOKEN}@huggingface.co/spaces/fenghebonjour/omyfish
          git push space HEAD:main --force
