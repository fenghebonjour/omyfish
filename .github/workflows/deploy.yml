name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip silently if HF_TOKEN secret is not configured yet
    if: ${{ secrets.HF_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://fenghebonjour:${HF_TOKEN}@huggingface.co/spaces/fenghebonjour/omyfish
          git push space HEAD:main --force
